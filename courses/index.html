<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - psin0s</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --text-dark: #111827;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 5rem;
        }

        /* Navbar (taki sam jak na głównej dla spójności) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 10%;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.2rem; text-decoration: none; color: black; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }

        /* Header sekcji kursów */
        .courses-header {
            text-align: center;
            padding: 4rem 10% 2rem;
        }

        .courses-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .courses-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .courses-header span {
            display: block;
            font-style: italic;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            color: #9ca3af;
        }

        /* Siatka kursów */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Styl kafelka */
        .course-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #f1f5f9;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .icon-box {
            background: #4f46e5; /* Fioletowo-niebieski jak na screenie */
            width: 50px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .icon-box svg {
            width: 28px;
            fill: white;
        }

        .course-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .category {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .explore-link {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .courses-grid { padding: 2rem 5%; }
            .courses-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">psin0s</a>
        <div class="nav-links">
            <span style="font-size: 0.9rem; font-weight: 500;">Courses</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><line x1="2" y1="12" x2="22" y2="12"></line></svg>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </div>
    </nav>

    <div class="courses-header">
        <h1>Programming Courses</h1>
        <p>Find your course and let's start learning!</p>
        <span>"Browse all available programming courses below."</span>
    </div>

    <div class="courses-grid">
        
        <a href="/courses/witryny-internetowe/1tp-e" class="course-card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM3.89 9L12 4.57 20.11 9 12 13.43 3.89 9z"/></svg>
            </div>
            <h3>Witryny Internetowe</h3>
            <div class="category">Programming Fundamentals</div>
            <div class="explore-link">Explore Course →</div>
        </a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - PsiN0s</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #0f172a;
            transition: 0.3s;
            min-height: 100vh;
        }

        body.dark {
            background: #0f172a;
            color: #ffffff;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid #e5e7eb;
        }
        body.dark nav { border-color: #334155; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-link { text-decoration: none; color: inherit; font-weight: 600; font-size: 15px; }

        /* Nagłówek na środku */
        .header-sec { padding: 80px 8% 20px; text-align: center; }
        .header-sec h1 { font-size: 50px; font-weight: 900; letter-spacing: -2px; margin-bottom: 12px; }
        .header-sec p { color: #4b5563; font-size: 18px; margin-bottom: 30px; }
        body.dark .header-sec p { color: #94a3b8; }

        /* Stylowe przyciski widoku (Ikony) */
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 50px; 
        }
        
        .view-btn {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            color: #64748b;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            transition: 0.2s;
        }
        body.dark .view-btn { background: #1e293b; border-color: #334155; color: #94a3b8; }
        
        .view-btn:hover { color: #5865f2; border-color: #5865f2; }
        .view-btn.active { background: #5865f2; color: white !important; border-color: #5865f2; }

        /* Grid / Lista */
        .grid { display: grid; gap: 25px; padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; transition: 0.3s; }
        
        .grid.view-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
        .grid.view-list { grid-template-columns: 1fr; max-width: 900px; }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 35px;
            text-decoration: none;
            color: inherit;
            display: flex;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark .card { background: #1e293b; border-color: #334155; }

        .view-grid .card { flex-direction: column; align-items: flex-start; }
        .view-list .card { flex-direction: row; align-items: center; justify-content: space-between; padding: 20px 30px; }

        .card:hover { transform: translateY(-8px); border-color: #5865f2; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .icon-box {
            width: 52px; height: 52px;
            background: rgba(88, 101, 242, 0.1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #5865f2;
            margin-bottom: 25px;
        }
        .view-list .icon-box { margin-bottom: 0; margin-right: 20px; width: 44px; height: 44px; }

        .card h3 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .card .cat { font-size: 13px; color: #5865f2; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }

        .explore { font-weight: 700; color: #5865f2; font-size: 15px; margin-top: 30px; display: flex; align-items: center; gap: 8px; }
        .view-list .explore { margin-top: 0; }

        @media (max-width: 700px) {
            .header-sec h1 { font-size: 36px; }
            .grid { padding: 0 5%; }
            .view-list .card { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body id="b">

    <nav>
        <span style="font-weight:900; font-size:20px; letter-spacing:-0.5px;">PsiN0s</span>
        <div class="nav-right">
            <a href="../index.html" class="nav-link">Home</a>
            <button onclick="t()" class="view-btn" style="border:none; background:none;">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </nav>

    <div class="header-sec">
        <h1>Programming Courses</h1>
        <p>Znajdź swój kurs i zacznij naukę!</p>

        <div class="controls">
            <button class="view-btn active" id="gridBtn" onclick="setView('grid')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </button>
            <button class="view-btn" id="listBtn" onclick="setView('list')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <div class="grid view-grid" id="cont">
        <a href="witryny-internetowe/index.html" class="card">
            <div>
                <div class="icon-box">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <p class="cat">Programming Fundamentals</p>
                <h3>Witryny Internetowe</h3>
            </div>
            <div class="explore">Explore Course ➔</div>
        </a>
    </div>

    <script>
        function setView(v) {
            const c = document.getElementById('cont');
            const g = document.getElementById('gridBtn');
            const l = document.getElementById('listBtn');
            if (v === 'grid') {
                c.className = 'grid view-grid';
                g.classList.add('active');
                l.classList.remove('active');
            } else {
                c.className = 'grid view-list';
                l.classList.add('active');
                g.classList.remove('active');
            }
        }

        function t() {
            const d = document.getElementById('b').classList.toggle('dark');
            localStorage.setItem('d', d);
        }
        if (localStorage.getItem('d') === 'true') document.getElementById('b').classList.add('dark');
    </script>
</body>
</html>

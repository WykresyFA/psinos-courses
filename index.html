<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsiN0s Programming Courses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #000;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.dark {
            background: #0f172a;
            color: #fff;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid #e5e7eb;
        }

        body.dark nav { border-color: #1e293b; }

        .logo {
            font-weight: 800;
            font-size: 18px;
            cursor: default;
            white-space: nowrap;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-link {
            text-decoration: none;
            color: inherit;
            font-weight: 600;
            font-size: 15px;
        }

        .toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: inherit;
            display: flex;
        }

        /* Sekcja główna */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 8% 100px 8%;
        }

        .container {
            display: flex;
            align-items: center;
            max-width: 1200px;
            width: 100%;
            gap: 60px;
        }

        .text-side { flex: 1; }

        .text-side h1 {
            font-size: clamp(40px, 6vw, 70px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
        }

        .text-side h2 {
            font-size: clamp(35px, 5vw, 65px);
            font-weight: 800;
            color: #5865f2;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .text-side p {
            font-size: 18px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 35px;
            max-width: 500px;
        }

        body.dark .text-side p { color: #94a3b8; }

        .btns { display: flex; gap: 15px; }

        .btn {
            padding: 14px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: 0.2s;
            text-align: center;
        }

        .btn-blue {
            background: #2563eb;
            color: #fff;
        }

        .btn-blue:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-border {
            border: 2px solid #e5e7eb;
            color: inherit;
        }

        body.dark .btn-border { border-color: #1e293b; }

        .btn-border:hover {
            background: rgba(0,0,0,0.05);
            transform: translateY(-3px);
        }

        body.dark .btn-border:hover { background: rgba(255,255,255,0.05); }

        /* Karta */
        .visual-side {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .card {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 16/10;
            background: linear-gradient(135deg, #7494ff 0%, #b366ff 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            animation: float 5s ease-in-out infinite;
        }

        .card svg { width: clamp(50px, 10vw, 80px); fill: #fff; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- MOBILE --- */
        @media (max-width: 900px) {
            nav { padding: 15px 5%; }
            
            .hero { padding: 40px 5% 60px 5%; }

            .container {
                flex-direction: column;
                text-align: center;
                gap: 40px;
            }

            .text-side {
                order: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .visual-side {
                order: 2;
                width: 100%;
                justify-content: center;
            }

            .btns {
                width: 100%;
                flex-direction: column;
            }

            .btn { width: 100%; }

            .card { max-width: 380px; }
        }
    </style>
</head>
<body id="b">

    <nav>
        <span class="logo">PsiN0s Programming Courses</span>
        <div class="nav-right">
            <a href="courses/" class="nav-link">Courses</a>
            <button class="toggle-btn" onclick="t()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </nav>

    <main class="hero">
        <div class="container">
            <div class="text-side">
                <h1>PsiN0s</h1>
                <h2>Your Learning Hub</h2>
                <p>Opanuj programowanie od zera dzięki naszym kursom. Praktyczna wiedza, teoretyczne zagadnienia, praktyczne zadania i wszystko czego potrzebujesz.</p>
                <div class="btns">
                    <a href="courses/" class="btn btn-blue">Explore Courses &nbsp; ➔</a>
                    <a href="https://discord.gg/Aqe3Z6eCDR" class="btn btn-border">Discord</a>
                </div>
            </div>
            
            <div class="visual-side">
                <div class="card">
                    <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM3.89 9L12 4.57 20.11 9 12 13.43 3.89 9zM12 16l-7-3.81V15l7 3.82L19 15v-2.81L12 16z"/></svg>
                </div>
            </div>
        </div>
    </main>

    <script>
        function t() {
            document.getElementById('b').classList.toggle('dark');
            localStorage.setItem('d', document.getElementById('b').classList.contains('dark'));
        }
        if (localStorage.getItem('d') === 'true') document.getElementById('b').classList.add('dark');
    </script>
</body>
</html>
